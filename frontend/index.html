<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>时间管理助手 · 交互原型</title>
<style>
:root{
  --purple:#6C216D; --purple-700:#571857; --purple-300:#A75FA8;
  --purple-tint:#F4EBF4; --purple-tint2:#EADBEA;
  --orange:#E18C3F; --orange-600:#C9752B; --orange-tint:#FBEEDD;
  --bg:#FAF7FA; --surface:#FFFFFF; --ink:#2C2530; --muted:#8B8194;
  --line:#ECE5ED; --line2:#E0D6E1; --warn:#C0392B; --warn-bg:#FBECEC; --warn-line:#F1CFCF;
  --ok:#3E8E5A; --ok-bg:#EAF5EE;
  --shadow:0 1px 2px rgba(44,37,48,.04),0 8px 24px rgba(108,33,109,.07);
  --shadow-lg:0 12px 40px rgba(108,33,109,.14);
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.hidden{display:none!important}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:14px 28px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--purple-300));display:grid;place-items:center;box-shadow:0 4px 12px rgba(108,33,109,.28)}
.brand-mark svg{width:19px;height:19px}
.brand-name{font-weight:700;font-size:16px}
.brand-sub{font-size:12px;color:var(--muted);margin-top:-3px}
.badge-top{margin-left:auto;font-size:12px;font-weight:700;color:var(--purple);background:var(--purple-tint);padding:6px 13px;border-radius:8px}
.wrap{max-width:1120px;margin:0 auto;padding:34px 28px 80px}

/* home hero */
.home-eyebrow{font-size:12.5px;font-weight:600;letter-spacing:2px;color:var(--orange-600);text-transform:uppercase}
.home-h1{font-size:30px;font-weight:800;margin:10px 0 8px}
.home-lead{color:var(--muted);max-width:600px;margin-bottom:26px}
.hero-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);max-width:680px}
.hero-flow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:4px 0 22px}
.flowchip{font-size:13px;font-weight:650;padding:7px 13px;border-radius:22px;background:var(--purple-tint);color:var(--purple)}
.flowarr{color:var(--line2)}
.btn{padding:11px 20px;border-radius:10px;font-size:14px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--purple);color:#fff;box-shadow:0 4px 14px rgba(108,33,109,.26)}
.btn-primary:hover{background:var(--purple-700)}
.btn-accent{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(225,140,63,.3)}
.btn-accent:hover{background:var(--orange-600)}
.btn-ghost{background:var(--surface);border:1.5px solid var(--line2);color:var(--ink)}
.btn-ghost:hover{background:var(--bg);border-color:var(--purple-300)}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:8px}

/* workspace */
.ws-head{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.ws-back{width:38px;height:38px;border-radius:10px;border:1px solid var(--line2);background:var(--surface);display:grid;place-items:center;color:var(--ink)}
.ws-back:hover{background:var(--purple-tint);border-color:var(--purple-tint2)}
.ws-title{font-size:21px;font-weight:750}
.ws-title .tag{font-size:11.5px;font-weight:700;color:var(--orange-600);background:var(--orange-tint);padding:3px 9px;border-radius:6px;margin-left:10px;vertical-align:middle}
.ws-grid{display:grid;grid-template-columns:236px 1fr;gap:26px;align-items:start}
.stepper{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);position:sticky;top:86px}
.step{display:flex;gap:12px;padding:13px 12px;border-radius:11px;cursor:pointer;transition:.15s;position:relative}
.step:hover{background:var(--bg)}
.step.active{background:var(--purple-tint)}
.step.locked{opacity:.45;cursor:not-allowed}
.step-num{width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:700;background:var(--surface);border:1.5px solid var(--line2);color:var(--muted);z-index:1}
.step.active .step-num{background:var(--purple);border-color:var(--purple);color:#fff}
.step.done .step-num{background:var(--orange);border-color:var(--orange);color:#fff}
.step:not(:last-child)::after{content:"";position:absolute;left:24.5px;top:39px;bottom:-1px;width:2px;background:var(--line);z-index:0}
.step.done:not(:last-child)::after{background:var(--orange)}
.step-tt{font-size:14px;font-weight:700;line-height:1.35}
.step-sub{font-size:11.5px;color:var(--muted)}
.step.active .step-tt{color:var(--purple-700)}
.panel{min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);min-height:460px;display:flex;flex-direction:column}
.panel-head{padding:22px 26px 0}
.panel-kick{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--orange-600);text-transform:uppercase}
.panel-h{font-size:20px;font-weight:750;margin:6px 0 4px}
.panel-desc{color:var(--muted);font-size:13.5px}
.panel-body{padding:22px 26px;flex:1}
.panel-foot{display:flex;align-items:center;gap:12px;padding:16px 26px;border-top:1px solid var(--line);background:var(--bg);border-radius:0 0 var(--radius) var(--radius)}
.io-hint{font-size:12px;color:var(--muted);margin-right:auto;display:flex;align-items:center;gap:6px}

/* day cards + AI check */
.grid4day{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.day-card{border:1.5px solid var(--line);border-radius:12px;padding:14px;background:var(--bg)}
.flabel{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;margin-bottom:7px}
.daybadge{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;flex:none}
textarea,input,select{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);border:1.5px solid var(--line2);border-radius:var(--radius-sm);padding:11px 13px;background:var(--surface);resize:vertical;transition:.15s}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--purple-300);box-shadow:0 0 0 3px var(--purple-tint)}
textarea{min-height:66px}
.field-fb{margin-top:9px;font-size:12.5px;border-radius:9px;padding:9px 11px;display:none}
.field-fb.show{display:block}
.field-fb.warn{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn)}
.field-fb.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #cfe6d8}
.field-fb .adopt{margin-top:7px;font-weight:700;color:#fff;background:var(--orange);padding:5px 11px;border-radius:7px;font-size:12px}
.field-fb .adopt:hover{background:var(--orange-600)}
.ai-check-bar{display:flex;align-items:center;gap:10px;background:var(--purple-tint);border-radius:11px;padding:11px 14px;margin-bottom:16px;font-size:13px;color:var(--purple-700)}
.ai-check-bar .spark{width:26px;height:26px;border-radius:8px;background:var(--purple);display:grid;place-items:center;flex:none}
.ai-check-bar .spark svg{width:15px;height:15px}
.mini-spin{width:15px;height:15px;border-radius:50%;border:2px solid var(--purple-tint2);border-top-color:var(--purple);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* task list */
.tasklist{display:flex;flex-direction:column;gap:10px}
.task{border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;background:var(--surface);display:flex;gap:12px;align-items:flex-start}
.task.manual{border-color:var(--purple-tint2);background:linear-gradient(0deg,var(--purple-tint) 0%,#fff 60%)}
.task-name{font-weight:650;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.mtag{font-size:10px;font-weight:800;color:var(--purple);background:var(--purple-tint);padding:2px 7px;border-radius:5px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.t{font-size:11px;font-weight:650;padding:3px 8px;border-radius:6px;background:var(--bg);color:var(--muted);border:1px solid var(--line)}
.t.imp{background:var(--purple-tint);color:var(--purple);border-color:transparent}
.t.urg{background:var(--orange-tint);color:var(--orange-600);border-color:transparent}
.task-del{color:var(--muted);width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;margin-left:auto}
.task-del:hover{background:var(--warn-bg);color:var(--warn)}
.addbtn{width:100%;margin-top:12px;border:1.5px dashed var(--line2);border-radius:12px;padding:12px;color:var(--purple);font-weight:700;font-size:13.5px;background:var(--surface);display:flex;align-items:center;justify-content:center;gap:8px}
.addbtn:hover{background:var(--purple-tint);border-color:var(--purple-300)}
.addform{margin-top:12px;border:1.5px solid var(--purple-tint2);border-radius:12px;padding:16px;background:var(--purple-tint)}
.addform h4{margin:0 0 12px;font-size:14px;color:var(--purple-700)}
.addgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.addgrid .full{grid-column:1/3}
.reqmark{color:var(--warn);margin-left:3px}
.fld label{display:block;font-size:12px;font-weight:650;color:var(--purple-700);margin-bottom:5px}
.addform .err{color:var(--warn);font-size:12px;margin-top:8px;display:none}
.addform .err.show{display:block}
.addactions{display:flex;gap:10px;margin-top:14px}

/* matrix */
.matrix-wrap{display:grid;grid-template-columns:26px 1fr;gap:10px}
.axis-y{writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-size:12px;font-weight:700;color:var(--muted);display:flex;justify-content:space-between;padding:6px 0}
.matrix{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px}
.axis-x{grid-column:2;display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-top:4px}
.quad{border-radius:12px;padding:13px;min-height:132px;position:relative;border:1.5px solid transparent}
.quad-h{font-size:12.5px;font-weight:750;margin-bottom:3px}
.quad-meta{font-size:11px;font-weight:600;margin-bottom:9px;opacity:.85}
.quad .qtask{font-size:11.5px;font-weight:600;background:rgba(255,255,255,.72);border-radius:6px;padding:4px 8px;margin-bottom:5px}
.q1{background:var(--purple);color:#fff}.q1 .qtask{background:rgba(255,255,255,.16)}
.q2{background:var(--purple-tint2);color:var(--purple-700)}
.q3{background:var(--orange-tint);color:var(--orange-600)}
.q4{background:var(--bg);color:var(--muted);border-color:var(--line2)}
.energy{position:absolute;top:11px;right:12px;font-size:15px;font-weight:800}

/* report */
.report{display:flex;flex-direction:column;gap:14px}
.markdown-body{min-width:0;color:#4A4152;font-size:13.5px;line-height:1.7;overflow-wrap:anywhere}
.markdown-body>:first-child{margin-top:0}.markdown-body>:last-child{margin-bottom:0}
.markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6{color:var(--ink);line-height:1.35;margin:1.15em 0 .55em}
.markdown-body h1{font-size:1.55rem}.markdown-body h2{font-size:1.28rem}.markdown-body h3{font-size:1.08rem}
.markdown-body h4,.markdown-body h5,.markdown-body h6{font-size:1rem}
.markdown-body p{margin:.6em 0}.markdown-body ul,.markdown-body ol{margin:.6em 0;padding-left:1.55rem}
.markdown-body li+li{margin-top:.28em}.markdown-body li>ul,.markdown-body li>ol{margin:.28em 0}
.markdown-body blockquote{margin:.8em 0;padding:.55em .9em;border-left:4px solid var(--orange);background:var(--orange-tint);color:#6b4a1e;border-radius:0 8px 8px 0}
.markdown-body blockquote p{margin:0}.markdown-body pre{max-width:100%;margin:.8em 0;padding:13px 15px;overflow-x:auto;background:#2C2530;color:#F8F3F8;border-radius:9px;line-height:1.55;white-space:pre}
.markdown-body code{font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;font-size:.9em}
.markdown-body :not(pre)>code{padding:.15em .38em;background:var(--purple-tint);color:var(--purple-700);border-radius:5px}
.markdown-body table{width:100%;margin:.8em 0;border-collapse:collapse;display:block;overflow-x:auto}
.markdown-body th,.markdown-body td{min-width:110px;padding:8px 10px;border:1px solid var(--line2);text-align:left}.markdown-body th{background:var(--purple-tint);color:var(--purple-700)}
.markdown-body a{color:var(--purple);text-decoration-thickness:1px;text-underline-offset:2px}.markdown-body hr{border:0;border-top:1px solid var(--line2);margin:1.1em 0}
.markdown-body s{color:var(--muted)}
.markdown-body .markdown-image{display:inline-block;padding:2px 8px;background:var(--purple-tint);color:var(--purple-700);border-radius:5px;font-size:12px}
.markdown-inline{display:inline}.markdown-report{border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--surface)}
.rcard{border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--surface)}
.rcard-h{display:flex;align-items:center;gap:9px;font-weight:750;font-size:14.5px;margin-bottom:9px}
.rcard-h .n{width:22px;height:22px;border-radius:6px;background:var(--purple-tint);color:var(--purple);display:grid;place-items:center;font-size:12px;font-weight:800}
.rlist{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.rlist li{font-size:13.5px;padding-left:18px;position:relative;color:#4A4152}
.rlist li::before{content:"";position:absolute;left:2px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--orange)}
.bank{display:flex;gap:10px;flex-wrap:wrap}
.bankb{flex:1;min-width:118px;border-radius:10px;padding:12px;text-align:center;color:#fff}
.bankb .big{font-size:22px;font-weight:800}
.bankb .lbl{font-size:11.5px;font-weight:600;opacity:.9}

/* AI processing */
.aiproc{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 20px}
.ai-orb{width:64px;height:64px;border-radius:50%;margin-bottom:14px;background:conic-gradient(from 0deg,var(--purple),var(--orange),var(--purple));animation:spin 1.1s linear infinite;-webkit-mask:radial-gradient(circle 22px at center,transparent 98%,#000 100%);mask:radial-gradient(circle 22px at center,transparent 98%,#000 100%)}
.ai-proc-t{font-size:16px;font-weight:750}
.ai-proc-s{color:var(--muted);font-size:13px}
.ai-steps{margin-top:16px;display:flex;flex-direction:column;gap:9px;align-items:flex-start}
.ai-step{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);opacity:.4;transition:.3s}
.ai-step.on{opacity:1;color:var(--ink)}
.ai-step .dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line2);flex:none}
.ai-step.on .dot{border-color:var(--orange);background:var(--orange)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);transition:.25s;z-index:60;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:820px){.ws-grid{grid-template-columns:1fr}.stepper{position:static;display:flex;overflow-x:auto;gap:4px}.step:not(:last-child)::after{display:none}.step{flex:none;min-width:150px}.grid4day,.addgrid{grid-template-columns:1fr}.addgrid .full{grid-column:1}.panel-foot{flex-wrap:wrap}.panel-foot .io-hint{flex:1 0 100%;margin-right:0}}
</style>

<div class="topbar">
  <div class="brand" onclick="go('home')">
    <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
    <div><div class="brand-name">时间管理助手</div><div class="brand-sub">昨天-今天-明天-后天 · 重要-紧急矩阵</div></div>
  </div>
  <div class="badge-top">管理自我</div>
</div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script src="./vendor/markdown-it.min.js"></script>
<script src="./markdown-renderer.js"></script>
<script>
const S={screen:'home',step:1,max:1};
const GOAL_KEYS=['昨','今','明','后'];
const GOALS=Object.fromEntries(GOAL_KEYS.map(key=>[key,'']));
let _checked=false;
let _checkRun=0;
let _transitionRun=0;
const STEPS=[{t:'目标梳理',s:'四天框架输入'},{t:'任务提取',s:'AI拆解 + 手动补充'},{t:'矩阵判定',s:'四象限归类'},{t:'优先级报告',s:'输出行动建议'}];
const I={
  arrow:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>',
  copy:'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>',
  plus:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  io:'<svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 10h9M9 6l4 4-4 4"/></svg>',
};
const BASE_TASKS=[
  {name:'**校对今天的方案终稿**',tags:[['紧急','urg'],['来源:今天',''],['截止:今天 18:00',''],['约1h','']]},
  {name:'跟进两个客户投诉',tags:[['重要','imp'],['紧急','urg'],['来源:临时',''],['截止:今天',''],['约1.5h','']]},
  {name:'复盘上季度转化缺口原因',tags:[['重要','imp'],['来源:复盘',''],['截止:本周五',''],['约2h','']]},
  {name:'推进本月选题策划',tags:[['重要','imp'],['来源:目标',''],['截止:本月',''],['约3h','']]},
  {name:'搭建团队分层培养框架',tags:[['重要','imp'],['来源:中长期',''],['截止:Q3',''],['约4h','']]},
  {name:'回复非紧急群消息',tags:[['来源:临时',''],['约0.5h','']]},
];
const TIME_REPORT_MARKDOWN=`## 今日优先处理顺序

- 先处理 **客户投诉**——重要且紧急,建议上午优先解决。
- 方案终稿校对可授权或压缩到 1 小时内完成。
- 把最大块精力留给“转化复盘 + 选题策划”两件重要不紧急的事。

## 精力分配原则

- 确保第二象限（重要不紧急）拿到 20–30% 精力,这是防止“总在救火”的关键。
- 第四象限压到 1–15%,群消息集中时段统一回复。

## 需结合复盘与目标的调整

- 上季度转化缺口指向“重执行、轻复盘”,建议每周固定 1 次复盘时段。
- “团队培养框架”属中长期,建议拆成里程碑排入未来两周日程。`;
const app=()=>document.getElementById('app');
function captureGoals(){
  let found=false;
  GOAL_KEYS.forEach(key=>{const field=document.getElementById('g-'+key);if(field){GOALS[key]=field.value;found=true;}});
  return found;
}
function restoreGoals(){GOAL_KEYS.forEach(key=>{const field=document.getElementById('g-'+key);if(field)field.value=GOALS[key];});}
function invalidateGoalCheck(){
  _checked=false;S.max=1;captureGoals();
  document.querySelectorAll('.step').forEach((step,index)=>{if(index>0){step.classList.add('locked');step.removeAttribute('onclick');}});
}
function navigateStep(step){if(step>1&&!ensureChecked())return;go('ws',step);}
function resetFlow(){
  S.step=1;S.max=1;GOAL_KEYS.forEach(key=>{GOALS[key]='';});
  _checked=false;_checkRun++;
}
function go(screen,step,reset=false){
  if(S.screen==='ws'&&S.step===1)captureGoals();
  _transitionRun++;_checkRun++;
  if(reset||screen==='home')resetFlow();
  S.screen=screen;if(step){S.step=step;S.max=Math.max(S.max,step);}render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
async function copySection(selector,successMessage){
  const target=document.querySelector(selector);
  if(!target){toast('没有可复制内容');return;}
  const text=target.innerText.trim();
  try{
    if(!navigator.clipboard?.writeText)throw new Error('clipboard unavailable');
    await navigator.clipboard.writeText(text);
    toast(successMessage);
  }catch{
    let input;
    try{
      input=document.createElement('textarea');
      input.value=text;input.readOnly=true;input.style.position='fixed';input.style.opacity='0';
      document.body.appendChild(input);input.select();
      const copied=typeof document.execCommand==='function'&&document.execCommand('copy');
      toast(copied?successMessage:'复制失败,请手动选择内容');
    }catch{
      toast('复制失败,请手动选择内容');
    }finally{
      input?.remove();
    }
  }
}

function render(){S.screen==='home'?home():ws();}
function home(){app().innerHTML=`
  <div class="home-eyebrow">Management Compass · 管理自我</div>
  <div class="home-h1">把杂乱的事,理成一份优先级清单</div>
  <p class="home-lead">先用"昨天-今天-明天-后天"梳理任务,AI 会检查填写是否到位并帮你补全;再用"重要-紧急矩阵"排序,输出可执行的优先级与精力分配报告。</p>
  <div class="hero-card">
    <div class="home-eyebrow" style="color:var(--muted)">四步流程</div>
    <div class="hero-flow">
      <span class="flowchip">目标梳理</span><span class="flowarr">→</span>
      <span class="flowchip">任务提取</span><span class="flowarr">→</span>
      <span class="flowchip">矩阵判定</span><span class="flowarr">→</span>
      <span class="flowchip">优先级报告</span>
    </div>
    <button class="btn btn-primary" onclick="go('ws',1,true)">开始梳理 ${I.arrow}</button>
  </div>`;}

function ws(){app().innerHTML=`
  <div class="ws-head"><button class="ws-back" onclick="go('home')">${I.back}</button>
    <div class="ws-title">时间管理助手<span class="tag">管理自我</span></div></div>
  <div class="ws-grid">
    <div class="stepper">${STEPS.map((s,i)=>{const n=i+1,done=n<S.step,active=n===S.step,locked=n>S.max;
      return `<div class="step ${active?'active':''} ${done?'done':''} ${locked?'locked':''}" onclick="${locked?'':`navigateStep(${n})`}">
        <div class="step-num">${done?'✓':n}</div><div><div class="step-tt">${s.t}</div><div class="step-sub">${s.s}</div></div></div>`;}).join('')}</div>
    <div class="panel" id="panel">${body(S.step)}</div>
  </div>`;
  if(S.step===1)restoreGoals();
  hydrateDynamicOutputs();}

function head(k,h,d){return `<div class="panel-head"><div class="panel-kick">${k}</div><div class="panel-h">${h}</div><div class="panel-desc">${d}</div></div>`;}
function nav({back,next,label,cls,foot}={}){
  let l=`<span class="io-hint">${I.io} 输入 · AI动作 · 输出 均按功能清单落地</span>`;
  if(back)l+=`<button class="btn btn-ghost" onclick="go('ws',${S.step-1})">上一步</button>`;
  if(foot)l+=foot;
  if(next)l+=`<button class="btn ${cls||'btn-primary'}" onclick="${next}">${label||'下一步'} ${I.arrow}</button>`;
  return `<div class="panel-foot">${l}</div>`;}
function runAI(to,t,s,steps){const p=document.getElementById('panel'),run=++_transitionRun;
  _checkRun++;if(S.step===1)captureGoals();
  const process=document.createElement('div');process.className='aiproc';
  const orb=document.createElement('div');orb.className='ai-orb';
  const title=document.createElement('div');title.className='ai-proc-t';title.textContent=t;
  const subtitle=document.createElement('div');subtitle.className='ai-proc-s';subtitle.textContent=s;
  const list=document.createElement('div');list.className='ai-steps';
  steps.forEach((text,i)=>{const item=document.createElement('div');item.className='ai-step';item.id='as'+i;
    const dot=document.createElement('span');dot.className='dot';item.append(dot,document.createTextNode(text));list.appendChild(item);});
  process.append(orb,title,subtitle,list);p.replaceChildren(process);
  steps.forEach((_,i)=>setTimeout(()=>{if(run!==_transitionRun)return;const e=document.getElementById('as'+i);if(e)e.classList.add('on');},350+i*520));
  setTimeout(()=>{if(run===_transitionRun)go('ws',to);},450+steps.length*520);}

/* ---------- fact-safe completion templates ---------- */
const COMPLETION_TEMPLATES={
 '昨':'请补充:原定目标、实际结果、差距与原因、下一步改进。',
 '今':'请补充:按“动词 + 对象 + 完成标准”逐条列出今天的关键工作。',
 '明':'请补充:具体目标、可衡量指标与截止时间。',
 '后':'请补充:中长期方向、阶段里程碑与时间节点。',
};
function body(step){
 if(step===1)return `${head('节点 ① · 输入','目标梳理','按"昨天-今天-明天-后天"四维梳理你手头的事。填完点"AI 检查并补全",内容不到位时会给出修正建议。')}
  <div class="panel-body">
    <div class="grid4day">
      ${day('昨','昨天 · 目标复盘','var(--purple-700)','过往目标达成、绩效差距及原因','例:上季度获客目标完成 80%…')}
      ${day('今','今天 · 关键工作','var(--purple)','当前正在推进的重点事项','例:校对方案、跟进客户投诉…')}
      ${day('明','明天 · 短期目标','var(--orange-600)','近一阶段要达成的目标','例:本月完成选题策划、上线活动…')}
      ${day('后','后天 · 中长期目标','var(--orange)','部门中长期规划与愿景','例:年内搭建团队分层培养体系…')}
    </div>
  </div>
  ${nav({foot:`<button class="btn btn-ghost" id="checkBtn" onclick="checkGoals()">${I.refresh} AI 检查并补全</button>`,next:`if(ensureChecked())runAI(2,'正在拆解任务要素','把四维内容整理成可执行任务并打标签',['读取四维目标输入','拆解为独立可执行任务','标注重要性与紧急度','估算来源与耗时'])`,label:'提取任务'})}`;

 if(step===2)return `${head('节点 ② · AI动作 + 手动补充','任务提取','AI 已把四维内容拆成逐条任务并打标签。你可删除,也可手动添加遗漏事项(需填来源、描述、截止时间、耗时)。')}
  <div class="panel-body">
    <div class="tasklist" id="tasklist"></div>
    <button class="addbtn" id="addbtn" onclick="toggleAdd(true)">${I.plus} 手动添加任务</button>
    <div class="addform hidden" id="addform">
      <h4>手动添加任务</h4>
      <div class="addgrid">
        <div class="fld full"><label>任务描述<span class="reqmark">*</span></label><input id="f-name" placeholder="要做的事,如:整理季度复盘材料"></div>
        <div class="fld"><label>来源<span class="reqmark">*</span></label>
          <select id="f-src"><option value="">请选择</option><option>复盘</option><option>今天</option><option>短期目标</option><option>中长期</option><option>临时</option></select></div>
        <div class="fld"><label>截止时间<span class="reqmark">*</span></label><input id="f-due" type="date"></div>
        <div class="fld"><label>预估耗时<span class="reqmark">*</span></label><input id="f-cost" placeholder="如:约 2h"></div>
        <div class="fld"><label>重要性 / 紧急度</label>
          <select id="f-flag"><option value="">未标注</option><option value="imp">重要</option><option value="urg">紧急</option><option value="both">重要且紧急</option></select></div>
      </div>
      <div class="err" id="addErr">请填写带 * 的必填项:任务描述、来源、截止时间、耗时。</div>
      <div class="addactions"><button class="btn btn-accent btn-sm" onclick="addTask()">${I.plus} 添加到列表</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleAdd(false)">取消</button></div>
    </div>
  </div>
  ${nav({back:true,next:`runAI(3,'正在进行矩阵判定','将任务落入四象限并分配精力',['判定每条任务的重要/紧急','落位重要-紧急四象限','按象限计算精力分配','生成排序建议'])`,label:'矩阵判定'})}`;

 if(step===3)return `${head('节点 ③ · AI动作','矩阵判定','每条任务已落入"重要-紧急"四象限,并按矩阵口径给出精力分配比例。')}
  <div class="panel-body"><div class="matrix-wrap">
    <div class="axis-y"><span>重要</span><span>不重要</span></div>
    <div><div class="matrix">
      <div class="quad q2"><div class="energy">20–30%</div><div class="quad-h">第二象限 · 优先第二位</div><div class="quad-meta">重要不紧急 · 计划做</div><div class="qtask">复盘上季度转化缺口</div><div class="qtask">推进本月选题策划</div><div class="qtask">搭建团队培养框架</div></div>
      <div class="quad q1"><div class="energy">50–60%</div><div class="quad-h">第一象限 · 优先第一位</div><div class="quad-meta">重要且紧急 · 立即做</div><div class="qtask">跟进两个客户投诉</div></div>
      <div class="quad q4"><div class="energy">1–15%</div><div class="quad-h">第四象限 · 优先第四位</div><div class="quad-meta">不重要不紧急 · 减少做</div><div class="qtask">回复非紧急群消息</div></div>
      <div class="quad q3"><div class="energy">15–20%</div><div class="quad-h">第三象限 · 优先第三位</div><div class="quad-meta">紧急不重要 · 授权做</div><div class="qtask">校对今天的方案终稿</div></div>
    </div><div class="axis-x"><span>不紧急</span><span>紧急</span></div></div>
  </div></div>
  ${nav({back:true,next:`runAI(4,'正在生成时间管理报告','汇总优先顺序、精力分配与调整建议',['汇总四象限排序','结合复盘与目标校准','测算精力分配比例','输出行动建议'])`,label:'生成报告'})}`;

 if(step===4)return `${head('节点 ④ · 输出','优先级报告','一页式可执行报告 —— 优先顺序、各梯队做什么、精力如何分配、需要哪些调整。')}
  <div class="panel-body"><div class="report">
    <div class="bank">
      <div class="bankb" style="background:var(--purple)"><div class="big">50–60%</div><div class="lbl">重要且紧急</div></div>
      <div class="bankb" style="background:var(--purple-300)"><div class="big">20–30%</div><div class="lbl">重要不紧急</div></div>
      <div class="bankb" style="background:var(--orange)"><div class="big">15–20%</div><div class="lbl">紧急不重要</div></div>
      <div class="bankb" style="background:#B9AFBE"><div class="big">1–15%</div><div class="lbl">不重要不紧急</div></div>
    </div>
    <div id="report-markdown" class="markdown-report"></div>
  </div></div>
  ${nav({back:true,foot:`<button class="btn btn-ghost btn-sm" onclick="copySection('.report','已复制报告')">${I.copy} 复制报告</button><button class="btn btn-ghost btn-sm" onclick="go('ws',1,true)">${I.refresh} 重新梳理</button>`,next:`go('home')`,label:'完成',cls:'btn-accent'})}`;
}
function day(b,label,color,desc,ph){return `<div class="day-card"><div class="flabel"><span class="daybadge" style="background:${color}">${b}</span>${label}</div>
  <div class="step-sub" style="margin:-4px 0 8px">${desc}</div><textarea id="g-${b}" placeholder="${ph}" oninput="invalidateGoalCheck()"></textarea>
  <div class="field-fb" id="fb-${b}"></div></div>`;}
function createTaskElement({name,tags,manual=false}){
  const task=document.createElement('div');task.className=`task${manual?' manual':''}`;
  const main=document.createElement('div');main.style.flex='1';
  const nameRow=document.createElement('div');nameRow.className='task-name';
  const nameText=document.createElement('span');renderMarkdown(nameText,name,{inline:true});nameRow.appendChild(nameText);
  if(manual){const badge=document.createElement('span');badge.className='mtag';badge.textContent='手动';nameRow.appendChild(badge);}
  const tagList=document.createElement('div');tagList.className='tags';
  tags.forEach(([text,className])=>{const tag=document.createElement('span');tag.className=`t${className?' '+className:''}`;tag.textContent=text;tagList.appendChild(tag);});
  const remove=document.createElement('button');remove.className='task-del';remove.type='button';remove.setAttribute('aria-label','删除任务');remove.innerHTML=I.trash;
  remove.addEventListener('click',()=>task.remove());main.append(nameRow,tagList);task.append(main,remove);return task;
}
function hydrateDynamicOutputs(){
  const taskList=document.getElementById('tasklist');
  if(taskList)taskList.replaceChildren(...BASE_TASKS.map(createTaskElement));
  const report=document.getElementById('report-markdown');
  if(report)renderMarkdown(report,TIME_REPORT_MARKDOWN);
}

/* ---- AI goal check ---- */
function checkGoals(){
  const btn=document.getElementById('checkBtn');if(!btn)return;
  const run=++_checkRun;
  btn.innerHTML=`<span class="mini-spin"></span> 检查中…`;btn.disabled=true;
  setTimeout(()=>{
    if(run!==_checkRun||S.screen!=='ws'||S.step!==1)return;
    const fields=GOAL_KEYS.map(key=>({key,ta:document.getElementById('g-'+key),fb:document.getElementById('fb-'+key)}));
    if(fields.some(({ta,fb})=>!ta||!fb))return;
    captureGoals();
    let allOk=true;
    const tips={'昨':'复盘需含"差距 + 原因"','今':'关键工作建议逐条列出','明':'短期目标建议可量化','后':'中长期建议标注时间节点'};
    fields.forEach(({key:k,ta,fb})=>{
      const tip=tips[k];
      const v=ta.value.trim();
      if(v.length>=18&&!v.includes('请补充:')){fb.className='field-fb ok show';fb.textContent='✓ 信息完整,可进入下一步。';}
      else{fb.className='field-fb warn show';
        allOk=false;
        const message=document.createTextNode(`${v?'描述较简略':'尚未填写'} —— ${tip}。`);
        const lineBreak=document.createElement('br');
        const adoptButton=document.createElement('button');adoptButton.className='adopt';adoptButton.type='button';adoptButton.textContent='采纳 AI 补全';
        adoptButton.addEventListener('click',()=>adopt(k));fb.replaceChildren(message,lineBreak,adoptButton);}
    });
    btn.innerHTML=`${I.refresh} 重新检查`;btn.disabled=false;_checked=allOk;
    toast(allOk?'目标输入已通过原型检查':'仍有待修正项,暂不能进入下一步');
  },1200);
}
function adopt(k){const ta=document.getElementById('g-'+k),fb=document.getElementById('fb-'+k);
  const current=ta.value.trim(),template=COMPLETION_TEMPLATES[k];
  ta.value=current?`${current}\n${template}`:template;invalidateGoalCheck();
  fb.className='field-fb warn show';fb.textContent='已插入待填写模板,请按实际情况补充后重新检查。';}
function ensureChecked(){if(_checked)return true;toast('请先完成 AI 检查并修正提示项');return false;}

/* ---- manual add ---- */
function toggleAdd(show){document.getElementById('addform').classList.toggle('hidden',!show);
  document.getElementById('addbtn').classList.toggle('hidden',show);
  if(show)document.getElementById('addform').scrollIntoView({behavior:'smooth',block:'center'});}
function addTask(){
  const name=document.getElementById('f-name').value.trim();
  const src=document.getElementById('f-src').value;
  const due=document.getElementById('f-due').value;
  const cost=document.getElementById('f-cost').value.trim();
  const flag=document.getElementById('f-flag').value;
  if(!name||!src||!due||!cost){document.getElementById('addErr').classList.add('show');return;}
  document.getElementById('addErr').classList.remove('show');
  const tags=[];if(flag==='imp'||flag==='both')tags.push(['重要','imp']);if(flag==='urg'||flag==='both')tags.push(['紧急','urg']);
  tags.push(['来源:'+src,'']);tags.push(['截止:'+due,'']);tags.push([cost.startsWith('约')?cost:('约'+cost),'']);
  document.getElementById('tasklist').appendChild(createTaskElement({name,tags,manual:true}));
  ['f-name','f-cost'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-src').value='';document.getElementById('f-due').value='';document.getElementById('f-flag').value='';
  toggleAdd(false);toast('已添加任务');
}
render();
</script>
