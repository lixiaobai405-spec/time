<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>时间管理助手 · 交互原型</title>
<style>
:root{
  --purple:#6C216D; --purple-700:#571857; --purple-300:#A75FA8;
  --purple-tint:#F4EBF4; --purple-tint2:#EADBEA;
  --orange:#E18C3F; --orange-600:#C9752B; --orange-tint:#FBEEDD;
  --bg:#FAF7FA; --surface:#FFFFFF; --ink:#2C2530; --muted:#8B8194;
  --line:#ECE5ED; --line2:#E0D6E1; --warn:#C0392B; --warn-bg:#FBECEC; --warn-line:#F1CFCF;
  --ok:#3E8E5A; --ok-bg:#EAF5EE;
  --shadow:0 1px 2px rgba(44,37,48,.04),0 8px 24px rgba(108,33,109,.07);
  --shadow-lg:0 12px 40px rgba(108,33,109,.14);
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.hidden{display:none!important}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:14px 28px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--purple-300));display:grid;place-items:center;box-shadow:0 4px 12px rgba(108,33,109,.28)}
.brand-mark svg{width:19px;height:19px}
.brand-name{font-weight:700;font-size:16px}
.brand-sub{font-size:12px;color:var(--muted);margin-top:-3px}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.badge-top{font-size:12px;font-weight:700;color:var(--purple);background:var(--purple-tint);padding:6px 13px;border-radius:8px}
.auth-user{font-size:12.5px;color:var(--muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.auth-logout{padding:6px 11px}
.wrap{max-width:1120px;margin:0 auto;padding:34px 28px 80px}

/* authentication */
.auth-card{width:min(100%,480px);margin:36px auto 0;padding:30px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.auth-title{font-size:25px;line-height:1.3;margin:9px 0 6px}
.auth-lead{font-size:13.5px;color:var(--muted);margin:0 0 22px}
.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-field{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:700;color:var(--purple-700)}
.auth-field input{font-weight:400;color:var(--ink)}
.auth-submit{justify-content:center;margin-top:3px}
.auth-links{display:flex;justify-content:space-between;gap:12px;margin-top:16px}
.auth-error{min-height:20px;font-size:12.5px;color:var(--warn)}
.recovery-warning{padding:11px 13px;border:1px solid var(--warn-line);border-radius:10px;background:var(--warn-bg);color:var(--warn);font-size:13px}
.recovery-code{display:block;margin:18px 0;padding:16px;border:1px solid var(--line2);border-radius:10px;background:var(--bg);color:var(--purple-700);font-family:"Cascadia Code",Consolas,monospace;font-size:15px;font-weight:700;line-height:1.8;letter-spacing:.5px;overflow-wrap:anywhere;user-select:all}
.auth-spinner{width:38px;height:38px;margin:24px auto 4px;border:4px solid var(--purple-tint2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}

/* history */
.history-page{max-width:900px;margin:0 auto}
.history-header{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.history-header h1{font-size:24px;margin:0}
.history-intro{margin:0 0 20px;color:var(--muted);font-size:13.5px}
.history-list{display:flex;flex-direction:column;gap:12px}
.history-item{display:flex;align-items:center;gap:18px;padding:18px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.history-item-content{min-width:0;flex:1}.history-item h2{margin:0 0 4px;font-size:16px;overflow-wrap:anywhere}.history-item p{margin:0;color:var(--muted);font-size:12.5px}
.history-item-actions,.history-detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.history-empty,.history-loading,.history-error{padding:22px;text-align:center;border:1px dashed var(--line2);border-radius:12px;color:var(--muted);background:var(--surface)}
.history-error{color:var(--warn);border-color:var(--warn-line);background:var(--warn-bg);margin-bottom:12px}
.history-more{display:flex;margin:18px auto 0}
.history-detail-content{display:flex;flex-direction:column;gap:14px}
.history-section{padding:18px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.history-section h2{margin:0 0 12px;font-size:16px}.history-section h3{margin:0 0 4px;font-size:14px}.history-section p{margin:3px 0;color:#4A4152;font-size:13px;overflow-wrap:anywhere}
.history-goals,.history-quadrants{display:grid;grid-template-columns:1fr 1fr;gap:10px}.history-goals>div,.history-quadrants>div{padding:11px;background:var(--bg);border-radius:9px}.history-goals p,.history-quadrants p{margin-bottom:0}
.history-tasks{display:flex;flex-direction:column;gap:9px}.history-tasks article{padding:12px;background:var(--bg);border-radius:9px}.history-tasks ul{margin:6px 0 0;padding-left:20px;font-size:13px}
.history-detail-actions{justify-content:flex-end;margin-top:14px}
.history-save-status{display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px 12px;border-radius:9px;background:var(--purple-tint);color:var(--purple-700);font-size:12.5px}
.history-save-status.failed{background:var(--warn-bg);color:var(--warn)}

/* home hero */
.home-eyebrow{font-size:12.5px;font-weight:600;letter-spacing:2px;color:var(--orange-600);text-transform:uppercase}
.home-h1{font-size:30px;font-weight:800;margin:10px 0 8px}
.home-lead{color:var(--muted);max-width:600px;margin-bottom:26px}
.hero-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);max-width:680px}
.hero-flow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:4px 0 22px}
.flowchip{font-size:13px;font-weight:650;padding:7px 13px;border-radius:22px;background:var(--purple-tint);color:var(--purple)}
.flowarr{color:var(--line2)}
.btn{padding:11px 20px;border-radius:10px;font-size:14px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--purple);color:#fff;box-shadow:0 4px 14px rgba(108,33,109,.26)}
.btn-primary:hover{background:var(--purple-700)}
.btn-accent{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(225,140,63,.3)}
.btn-accent:hover{background:var(--orange-600)}
.btn-ghost{background:var(--surface);border:1.5px solid var(--line2);color:var(--ink)}
.btn-ghost:hover{background:var(--bg);border-color:var(--purple-300)}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:8px}

/* workspace */
.ws-head{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.ws-back{width:38px;height:38px;border-radius:10px;border:1px solid var(--line2);background:var(--surface);display:grid;place-items:center;color:var(--ink)}
.ws-back:hover{background:var(--purple-tint);border-color:var(--purple-tint2)}
.ws-title{font-size:21px;font-weight:750}
.ws-title .tag{font-size:11.5px;font-weight:700;color:var(--orange-600);background:var(--orange-tint);padding:3px 9px;border-radius:6px;margin-left:10px;vertical-align:middle}
.ws-grid{display:grid;grid-template-columns:236px 1fr;gap:26px;align-items:start}
.stepper{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);position:sticky;top:86px}
.step{display:flex;gap:12px;padding:13px 12px;border-radius:11px;cursor:pointer;transition:.15s;position:relative}
.step:hover{background:var(--bg)}
.step.active{background:var(--purple-tint)}
.step.locked{opacity:.45;cursor:not-allowed}
.step-num{width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:700;background:var(--surface);border:1.5px solid var(--line2);color:var(--muted);z-index:1}
.step.active .step-num{background:var(--purple);border-color:var(--purple);color:#fff}
.step.done .step-num{background:var(--orange);border-color:var(--orange);color:#fff}
.step:not(:last-child)::after{content:"";position:absolute;left:24.5px;top:39px;bottom:-1px;width:2px;background:var(--line);z-index:0}
.step.done:not(:last-child)::after{background:var(--orange)}
.step-tt{font-size:14px;font-weight:700;line-height:1.35}
.step-sub{font-size:11.5px;color:var(--muted)}
.step.active .step-tt{color:var(--purple-700)}
.panel{min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);min-height:460px;display:flex;flex-direction:column}
.panel-head{padding:22px 26px 0}
.panel-kick{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--orange-600);text-transform:uppercase}
.panel-h{font-size:20px;font-weight:750;margin:6px 0 4px}
.panel-desc{color:var(--muted);font-size:13.5px}
.panel-body{padding:22px 26px;flex:1}
.panel-foot{display:flex;align-items:center;gap:12px;padding:16px 26px;border-top:1px solid var(--line);background:var(--bg);border-radius:0 0 var(--radius) var(--radius)}
.io-hint{font-size:12px;color:var(--muted);margin-right:auto;display:flex;align-items:center;gap:6px}

/* day cards + AI check */
.grid4day{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.day-card{border:1.5px solid var(--line);border-radius:12px;padding:14px;background:var(--bg)}
.flabel{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;margin-bottom:7px}
.daybadge{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;flex:none}
textarea,input,select{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);border:1.5px solid var(--line2);border-radius:var(--radius-sm);padding:11px 13px;background:var(--surface);resize:vertical;transition:.15s}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--purple-300);box-shadow:0 0 0 3px var(--purple-tint)}
textarea{min-height:66px}
.field-fb{margin-top:9px;font-size:12.5px;border-radius:9px;padding:9px 11px;display:none}
.field-fb.show{display:block}
.field-fb.warn{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn)}
.field-fb.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #cfe6d8}
.field-fb .adopt{margin-top:7px;font-weight:700;color:#fff;background:var(--orange);padding:5px 11px;border-radius:7px;font-size:12px}
.field-fb .adopt:hover{background:var(--orange-600)}
.ai-check-bar{display:flex;align-items:center;gap:10px;background:var(--purple-tint);border-radius:11px;padding:11px 14px;margin-bottom:16px;font-size:13px;color:var(--purple-700)}
.ai-check-bar .spark{width:26px;height:26px;border-radius:8px;background:var(--purple);display:grid;place-items:center;flex:none}
.ai-check-bar .spark svg{width:15px;height:15px}
.mini-spin{width:15px;height:15px;border-radius:50%;border:2px solid var(--purple-tint2);border-top-color:var(--purple);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* task list */
.tasklist{display:flex;flex-direction:column;gap:10px}
.task{border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;background:var(--surface);display:flex;gap:12px;align-items:flex-start}
.task.manual{border-color:var(--purple-tint2);background:linear-gradient(0deg,var(--purple-tint) 0%,#fff 60%)}
.task-name{font-weight:650;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.mtag{font-size:10px;font-weight:800;color:var(--purple);background:var(--purple-tint);padding:2px 7px;border-radius:5px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.t{font-size:11px;font-weight:650;padding:3px 8px;border-radius:6px;background:var(--bg);color:var(--muted);border:1px solid var(--line)}
.t.imp{background:var(--purple-tint);color:var(--purple);border-color:transparent}
.t.urg{background:var(--orange-tint);color:var(--orange-600);border-color:transparent}
.task-detail{margin-top:9px;padding-top:8px;border-top:1px solid var(--line);font-size:12px;color:#4A4152}
.task-detail-title{font-weight:750;color:var(--purple-700);margin-bottom:3px}
.task-detail ul{margin:0;padding-left:18px}
.task-detail li+li{margin-top:2px}
.task-del{color:var(--muted);width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;margin-left:auto}
.task-del:hover{background:var(--warn-bg);color:var(--warn)}
.addbtn{width:100%;margin-top:12px;border:1.5px dashed var(--line2);border-radius:12px;padding:12px;color:var(--purple);font-weight:700;font-size:13.5px;background:var(--surface);display:flex;align-items:center;justify-content:center;gap:8px}
.addbtn:hover{background:var(--purple-tint);border-color:var(--purple-300)}
.addform{margin-top:12px;border:1.5px solid var(--purple-tint2);border-radius:12px;padding:16px;background:var(--purple-tint)}
.addform h4{margin:0 0 12px;font-size:14px;color:var(--purple-700)}
.addgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.addgrid .full{grid-column:1/3}
.reqmark{color:var(--warn);margin-left:3px}
.fld label{display:block;font-size:12px;font-weight:650;color:var(--purple-700);margin-bottom:5px}
.addform .err{color:var(--warn);font-size:12px;margin-top:8px;display:none}
.addform .err.show{display:block}
.addactions{display:flex;gap:10px;margin-top:14px}

/* matrix */
.matrix-wrap{display:grid;grid-template-columns:26px 1fr;gap:10px}
.axis-y{text-align:center;font-size:12px;font-weight:700;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:6px 0}
.axis-y span{writing-mode:vertical-rl;text-orientation:upright}
.matrix{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px}
.axis-x{grid-column:2;display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-top:4px}
.quad{border-radius:12px;padding:13px;min-height:132px;position:relative;border:1.5px solid transparent}
.quad-h{font-size:12.5px;font-weight:750;margin-bottom:3px}
.quad-meta{font-size:11px;font-weight:600;margin-bottom:9px;opacity:.85}
.quad .qtask{font-size:11.5px;font-weight:600;background:rgba(255,255,255,.72);border-radius:6px;padding:4px 8px;margin-bottom:5px}
.q1{background:var(--purple);color:#fff}.q1 .qtask{background:rgba(255,255,255,.16)}
.q2{background:var(--purple-tint2);color:var(--purple-700)}
.q3{background:var(--orange-tint);color:var(--orange-600)}
.q4{background:var(--bg);color:var(--muted);border-color:var(--line2)}
.energy{position:absolute;top:11px;right:12px;font-size:15px;font-weight:800}

/* report */
.report{display:flex;flex-direction:column;gap:14px}
.markdown-body{min-width:0;color:#4A4152;font-size:13.5px;line-height:1.7;overflow-wrap:anywhere}
.markdown-body>:first-child{margin-top:0}.markdown-body>:last-child{margin-bottom:0}
.markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6{color:var(--ink);line-height:1.35;margin:1.15em 0 .55em}
.markdown-body h1{font-size:1.55rem}.markdown-body h2{font-size:1.28rem}.markdown-body h3{font-size:1.08rem}
.markdown-body h4,.markdown-body h5,.markdown-body h6{font-size:1rem}
.markdown-body p{margin:.6em 0}.markdown-body ul,.markdown-body ol{margin:.6em 0;padding-left:1.55rem}
.markdown-body li+li{margin-top:.28em}.markdown-body li>ul,.markdown-body li>ol{margin:.28em 0}
.markdown-body blockquote{margin:.8em 0;padding:.55em .9em;border-left:4px solid var(--orange);background:var(--orange-tint);color:#6b4a1e;border-radius:0 8px 8px 0}
.markdown-body blockquote p{margin:0}.markdown-body pre{max-width:100%;margin:.8em 0;padding:13px 15px;overflow-x:auto;background:#2C2530;color:#F8F3F8;border-radius:9px;line-height:1.55;white-space:pre}
.markdown-body code{font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace;font-size:.9em}
.markdown-body :not(pre)>code{padding:.15em .38em;background:var(--purple-tint);color:var(--purple-700);border-radius:5px}
.markdown-body table{width:100%;margin:.8em 0;border-collapse:collapse;display:block;overflow-x:auto}
.markdown-body th,.markdown-body td{min-width:110px;padding:8px 10px;border:1px solid var(--line2);text-align:left}.markdown-body th{background:var(--purple-tint);color:var(--purple-700)}
.markdown-body a{color:var(--purple);text-decoration-thickness:1px;text-underline-offset:2px}.markdown-body hr{border:0;border-top:1px solid var(--line2);margin:1.1em 0}
.markdown-body s{color:var(--muted)}
.markdown-body .markdown-image{display:inline-block;padding:2px 8px;background:var(--purple-tint);color:var(--purple-700);border-radius:5px;font-size:12px}
.markdown-inline{display:inline}.markdown-report{border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--surface)}
.rcard{border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--surface)}
.rcard-h{display:flex;align-items:center;gap:9px;font-weight:750;font-size:14.5px;margin-bottom:9px}
.rcard-h .n{width:22px;height:22px;border-radius:6px;background:var(--purple-tint);color:var(--purple);display:grid;place-items:center;font-size:12px;font-weight:800}
.rlist{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.rlist li{font-size:13.5px;padding-left:18px;position:relative;color:#4A4152}
.rlist li::before{content:"";position:absolute;left:2px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--orange)}
.bank{display:flex;gap:10px;flex-wrap:wrap}
.bankb{flex:1;min-width:118px;border-radius:10px;padding:12px;text-align:center;color:#fff}
.bankb .big{font-size:22px;font-weight:800}
.bankb .lbl{font-size:11.5px;font-weight:600;opacity:.9}

/* AI processing */
.aiproc{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 20px}
.ai-orb{width:64px;height:64px;border-radius:50%;margin-bottom:14px;background:conic-gradient(from 0deg,var(--purple),var(--orange),var(--purple));animation:spin 1.1s linear infinite;-webkit-mask:radial-gradient(circle 22px at center,transparent 98%,#000 100%);mask:radial-gradient(circle 22px at center,transparent 98%,#000 100%)}
.ai-proc-t{font-size:16px;font-weight:750}
.ai-proc-s{color:var(--muted);font-size:13px}
.ai-steps{margin-top:16px;display:flex;flex-direction:column;gap:9px;align-items:flex-start}
.ai-step{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);opacity:.4;transition:.3s}
.ai-step.on{opacity:1;color:var(--ink)}
.ai-step .dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line2);flex:none}
.ai-step.on .dot{border-color:var(--orange);background:var(--orange)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);transition:.25s;z-index:60;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:820px){.topbar{padding:12px 16px;gap:8px}.brand{min-width:0}.brand-name{font-size:14px;white-space:nowrap}.brand-sub,.badge-top,.auth-user{display:none!important}.top-actions{gap:6px}.auth-history-link,.auth-logout{padding:6px 8px;white-space:nowrap}.wrap{padding:24px 16px 64px}.auth-card{margin-top:16px;padding:22px}.history-item{align-items:flex-start;flex-direction:column}.history-item-actions{width:100%}.history-goals,.history-quadrants{grid-template-columns:1fr}.ws-grid{grid-template-columns:1fr}.stepper{position:static;display:flex;overflow-x:auto;gap:4px}.step:not(:last-child)::after{display:none}.step{flex:none;min-width:150px}.grid4day,.addgrid{grid-template-columns:1fr}.addgrid .full{grid-column:1}.panel-foot{flex-wrap:wrap}.panel-foot .io-hint{flex:1 0 100%;margin-right:0}}
</style>

<div class="topbar">
  <div class="brand" role="button" tabindex="0">
    <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
