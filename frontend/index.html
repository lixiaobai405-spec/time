<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>时间管理助手</title>
<style>
:root{
  --purple:#6C216D;--purple-700:#571857;--purple-300:#A75FA8;
  --purple-tint:#F4EBF4;--purple-tint2:#EADBEA;
  --orange:#E18C3F;--orange-600:#C9752B;--orange-tint:#FBEEDD;
  --bg:#FAF7FA;--surface:#FFFFFF;--ink:#2C2530;--muted:#8B8194;
  --line:#ECE5ED;--line2:#E0D6E1;
  --warn:#C0392B;--warn-bg:#FBECEC;--warn-line:#F1CFCF;
  --ok:#3E8E5A;--ok-bg:#EAF5EE;--ok-line:#CFE6D8;
  --shadow:0 1px 2px rgba(44,37,48,.04),0 8px 24px rgba(108,33,109,.07);
  --shadow-lg:0 12px 40px rgba(108,33,109,.14);
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:disabled{cursor:not-allowed;opacity:.62}
.hidden{display:none!important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;padding:13px 26px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);min-height:61px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;min-width:0}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--purple-300));display:grid;place-items:center;box-shadow:0 4px 12px rgba(108,33,109,.28);flex:none}
.brand-mark svg{width:19px;height:19px}
.brand-name{font-weight:700;font-size:16px;white-space:nowrap}
.brand-sub{font-size:11.5px;color:var(--muted);margin-top:-3px;white-space:nowrap}
.topnav{margin-left:auto;display:flex;align-items:center;gap:5px;min-width:0}
.tnav{padding:7px 14px;border-radius:8px;font-size:13.5px;font-weight:650;color:var(--muted);white-space:nowrap}
.tnav:hover,.tnav.on{background:var(--purple-tint);color:var(--purple)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--purple);color:#fff;display:grid;place-items:center;font-size:12.5px;font-weight:700;margin-left:6px;cursor:pointer;flex:none}
.auth-mini{font-size:11.5px;color:var(--muted);white-space:nowrap}
.wrap{max-width:1180px;margin:0 auto;padding:30px 26px 80px}

.btn{padding:11px 20px;border-radius:10px;font-size:14px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--purple);color:#fff;box-shadow:0 4px 14px rgba(108,33,109,.26)}
.btn-primary:hover{background:var(--purple-700)}
.btn-accent{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(225,140,63,.3)}
.btn-accent:hover{background:var(--orange-600)}
.btn-ghost{background:var(--surface);border:1.5px solid var(--line2);color:var(--ink)}
.btn-ghost:hover{background:var(--bg);border-color:var(--purple-300)}
.btn-danger{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn)}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:8px}
.btn-block{width:100%}

.login-wrap{min-height:82vh;display:grid;place-items:center}
.login-card{width:400px;max-width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:34px 32px}
.login-h{font-size:22px;font-weight:800;margin:14px 0 4px}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.tabs{display:flex;gap:4px;background:var(--purple-tint);padding:4px;border-radius:10px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:7px;font-size:13.5px;font-weight:700;color:var(--purple);opacity:.7}
.tab.on{background:var(--surface);opacity:1;box-shadow:0 1px 4px rgba(108,33,109,.12)}
.demo-note{margin-top:16px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.5}
.auth-links{display:flex;justify-content:space-between;gap:10px;margin-top:12px}
.auth-error{min-height:20px;color:var(--warn);font-size:12px;margin-top:8px}
.recovery-warning{padding:11px 13px;border:1px solid var(--warn-line);border-radius:10px;background:var(--warn-bg);color:var(--warn);font-size:13px}
.recovery-code{display:block;margin:18px 0;padding:16px;border:1px solid var(--line2);border-radius:10px;background:var(--bg);color:var(--purple-700);font-family:Consolas,monospace;font-size:15px;font-weight:700;line-height:1.8;overflow-wrap:anywhere;user-select:all}
.auth-spinner{width:38px;height:38px;margin:24px auto 4px;border:4px solid var(--purple-tint2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}

label.fl,.fld label{display:block;font-size:12px;font-weight:650;margin-bottom:5px}
input,select,textarea{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);border:1.5px solid var(--line2);border-radius:var(--radius-sm);padding:10px 12px;background:var(--surface);transition:.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple-300);box-shadow:0 0 0 3px var(--purple-tint)}
textarea{resize:vertical;line-height:1.6}
.field{margin-bottom:14px}
.req{color:var(--warn)}

.phead{display:flex;align-items:flex-end;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.ptitle{font-size:24px;font-weight:800}
.pdesc{color:var(--muted);font-size:13.5px;margin-bottom:22px}
.remind{display:flex;gap:12px;align-items:flex-start;background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:12px;padding:13px 16px;margin-bottom:20px}
.remind .ic{width:26px;height:26px;border-radius:8px;background:var(--warn);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;flex:none}
.remind b{color:var(--warn)}
.remind .list{font-size:12.5px;color:#7d3b33;margin-top:3px}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.hcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow)}
.hcard .cap{font-size:11.5px;font-weight:700;color:var(--muted)}
.hcard .big{font-size:26px;font-weight:800;margin:2px 0}
.hcard .tgt{font-size:11px;font-weight:650}
.pill-ok{color:var(--ok)}.pill-bad{color:var(--warn)}
.panelbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:18px}
.pb-h{font-size:15px;font-weight:750;margin-bottom:4px;display:flex;align-items:center;gap:9px}
.pb-h .n{width:23px;height:23px;border-radius:7px;background:var(--purple-tint);color:var(--purple);display:grid;place-items:center;font-size:12px;font-weight:800}
.pb-d{color:var(--muted);font-size:12.5px;margin-bottom:14px}

.ws-grid{display:grid;grid-template-columns:224px 1fr;gap:24px;align-items:start}
.stepper{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);position:sticky;top:82px}
.step{display:flex;gap:11px;padding:12px 11px;border-radius:11px;cursor:pointer;position:relative}
.step:hover{background:var(--bg)}
.step.active{background:var(--purple-tint)}
.step.locked{opacity:.45;cursor:not-allowed}
.step-num{width:25px;height:25px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:12.5px;font-weight:700;background:var(--surface);border:1.5px solid var(--line2);color:var(--muted);z-index:1}
.step.active .step-num{background:var(--purple);border-color:var(--purple);color:#fff}
.step.done .step-num{background:var(--orange);border-color:var(--orange);color:#fff}
.step:not(:last-child)::after{content:"";position:absolute;left:23.5px;top:37px;bottom:-1px;width:2px;background:var(--line)}
.step.done:not(:last-child)::after{background:var(--orange)}
.step-tt{font-size:13.5px;font-weight:700;line-height:1.3}
.step-sub{font-size:11px;color:var(--muted)}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:520px;min-width:0}
.panel-head{padding:20px 24px 0}
.panel-kick{font-size:11.5px;font-weight:700;letter-spacing:1.4px;color:var(--orange-600);text-transform:uppercase}
.panel-h{font-size:19px;font-weight:750;margin:5px 0 4px}
.panel-desc{color:var(--muted);font-size:13px}
.panel-body{padding:20px 24px;flex:1;min-width:0}
.panel-foot{display:flex;align-items:center;gap:10px;padding:15px 24px;border-top:1px solid var(--line);background:var(--bg);border-radius:0 0 var(--radius) var(--radius);flex-wrap:wrap}
.foot-hint{font-size:11.5px;color:var(--muted);margin-right:auto}

.cols4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.col{background:var(--bg);border:1.5px solid var(--line);border-radius:13px;padding:12px;display:flex;flex-direction:column;min-width:0}
.col-h{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.col-badge{width:22px;height:22px;border-radius:6px;color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center;flex:none}
.col-t{font-size:13px;font-weight:750}
.col-target{margin-left:auto;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:5px;background:var(--surface);border:1px solid var(--line2);white-space:nowrap}
.col-d{font-size:10.5px;color:var(--muted);line-height:1.45;margin-bottom:9px;min-height:46px}
.col textarea{font-size:12px;min-height:150px;background:var(--surface)}
.col-note{font-size:10px;color:var(--muted);font-style:italic;margin-top:7px;line-height:1.4}
.cnt{font-size:10.5px;color:var(--muted);margin-top:6px;text-align:right}
.field-fb{margin-top:8px;font-size:11px;border-radius:8px;padding:8px 9px}
.field-fb.warn{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn)}
.field-fb.ok{background:var(--ok-bg);border:1px solid var(--ok-line);color:var(--ok)}

.tgrid{width:100%;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.trow{display:grid;gap:8px;padding:9px 11px;align-items:center;border-bottom:1px solid var(--line);background:var(--surface);min-width:0}
.trow:last-child{border-bottom:none}
.trow.hd{background:var(--purple-tint);font-size:11px;font-weight:800;color:var(--purple-700);padding:8px 11px}
.trow.miss{background:#FFFAFA}
.trow.doneRow{background:#FAFCFB}
.g-edit{grid-template-columns:minmax(160px,1.6fr) 88px 118px 82px 128px 30px}
.g-daily{grid-template-columns:26px minmax(160px,1.5fr) 78px 114px 70px 122px 150px 28px}
.trow input,.trow select{padding:6px 8px;font-size:11.5px;border-radius:7px;min-width:0}
.trow input.miss,.trow select.miss{border-color:var(--warn-line);background:var(--warn-bg)}
.mobile-label{display:none;font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px}
.del{color:var(--muted);font-size:17px;line-height:1;text-align:center}
.del:hover{color:var(--warn)}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--line2);display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;flex:none}
.chk.on{background:var(--ok);border-color:var(--ok)}
.tname.done{text-decoration:line-through;opacity:.6}

.aibar{display:flex;align-items:center;gap:11px;background:var(--purple-tint);border-radius:11px;padding:11px 14px;margin-bottom:15px;font-size:12.5px;color:var(--purple-700);flex-wrap:wrap}
.aibar .sp{width:26px;height:26px;border-radius:8px;background:var(--purple);display:grid;place-items:center;flex:none;color:#fff;font-weight:800;font-size:13px}
.mini-spin{width:14px;height:14px;border-radius:50%;border:2px solid var(--purple-tint2);border-top-color:var(--purple);animation:spin .7s linear infinite;display:inline-block;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.aiproc{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 20px}
.ai-orb{width:60px;height:60px;border-radius:50%;margin-bottom:14px;background:conic-gradient(from 0deg,var(--purple),var(--orange),var(--purple));animation:spin 1.1s linear infinite;-webkit-mask:radial-gradient(circle 21px at center,transparent 98%,#000 100%);mask:radial-gradient(circle 21px at center,transparent 98%,#000 100%)}
.ai-steps{margin-top:15px;display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.ai-step{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink)}
.ai-step .dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--orange);background:var(--orange);flex:none}

.distrow{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.dist-label{width:150px;flex:none;font-size:12.5px;font-weight:700}
.dist-label span{display:block;font-size:10.5px;color:var(--muted);font-weight:500}
.bar-wrap{flex:1;position:relative;height:30px;background:var(--bg);border-radius:8px;border:1px solid var(--line);overflow:hidden}
.bar{height:100%;border-radius:7px 0 0 7px;display:flex;align-items:center;padding-left:9px;color:#fff;font-size:11.5px;font-weight:800;min-width:3px}
.tgt-mark{position:absolute;top:0;bottom:0;border-left:2px dashed var(--muted);opacity:.75;z-index:2}
.tgt-band{position:absolute;top:0;bottom:0;background:rgba(62,142,90,.12);border-left:2px dashed var(--ok);border-right:2px dashed var(--ok);z-index:2}
.dist-num{width:132px;flex:none;text-align:right;font-size:12px;font-weight:700}
.dist-num small{display:block;font-weight:600;font-size:10.5px}
.legend{font-size:11px;color:var(--muted);margin-top:6px}
.diagnosis{background:var(--orange-tint);border:1px solid #F0D9B8;border-radius:12px;padding:14px 16px;font-size:13px;color:#6B4A1E;line-height:1.65;margin-top:16px}
.diagnosis b{color:var(--orange-600)}

.mx-wrap{display:grid;grid-template-columns:24px 1fr;gap:9px}
.axis-y{writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-size:11.5px;font-weight:700;color:var(--muted);display:flex;justify-content:space-between;padding:6px 0}
.mx{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px}
.axis-x{display:flex;justify-content:space-between;font-size:11.5px;font-weight:700;color:var(--muted);margin-top:4px}
.quad{border-radius:12px;padding:12px;min-height:145px;border:1.5px solid transparent;position:relative}
.quad-h{font-size:12.5px;font-weight:750}
.quad-m{font-size:10.5px;font-weight:600;opacity:.85;margin-bottom:8px}
.qt{font-size:11px;font-weight:600;border-radius:6px;padding:4px 8px;margin-bottom:5px;background:rgba(255,255,255,.75);overflow-wrap:anywhere}
.qt small{opacity:.8;font-weight:500}
.q1{background:var(--purple);color:#fff}.q1 .qt{background:rgba(255,255,255,.17)}
.q2{background:var(--purple-tint2);color:var(--purple-700)}
.q3{background:var(--orange-tint);color:var(--orange-600)}
.q4{background:var(--bg);color:var(--muted);border-color:var(--line2)}
.energy{position:absolute;top:10px;right:11px;font-weight:800;font-size:13px}

.rcard{border:1.5px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:13px}
.rcard-h{display:flex;align-items:center;gap:9px;font-weight:750;font-size:14px;margin-bottom:9px}
.rcard-h .n{width:22px;height:22px;border-radius:6px;background:var(--purple-tint);color:var(--purple);display:grid;place-items:center;font-size:11.5px;font-weight:800}
.rlist{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.rlist li{font-size:13px;padding-left:17px;position:relative;color:#4A4152}
.rlist li::before{content:"";position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--orange)}
.markdown-body{min-width:0;color:#4A4152;font-size:13px;line-height:1.7;overflow-wrap:anywhere}
.markdown-body h1,.markdown-body h2,.markdown-body h3{color:var(--ink);line-height:1.35}
.markdown-body pre{max-width:100%;overflow-x:auto;background:#2C2530;color:#fff;padding:12px;border-radius:9px}
.markdown-body table{display:block;overflow-x:auto;border-collapse:collapse;width:100%}
.markdown-body th,.markdown-body td{border:1px solid var(--line2);padding:7px 9px;min-width:100px}
.markdown-body th{background:var(--purple-tint)}
.history-save-status{display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px 12px;border-radius:9px;background:var(--purple-tint);color:var(--purple-700);font-size:12.5px}
.history-save-status.failed{background:var(--warn-bg);color:var(--warn)}
.daily-save-status{margin-left:auto;padding:6px 10px;border-radius:8px;background:var(--bg);color:var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}
.daily-save-status.saving,.daily-save-status.dirty{background:var(--orange-tint);color:var(--orange-600)}
.daily-save-status.saved{background:var(--ok-bg);color:var(--ok)}
.daily-save-status.failed{background:var(--warn-bg);color:var(--warn)}

.roll-box{background:var(--purple-tint);border-radius:12px;padding:15px 17px;margin-top:18px;font-size:12.5px;color:var(--purple-700)}
.hrow{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 16px;margin-bottom:9px;flex-wrap:wrap}
.hdate{font-size:12.5px;font-weight:700;width:110px;flex:none}
.hbar{flex:1;min-width:150px;height:9px;border-radius:5px;background:var(--bg);overflow:hidden;display:flex}
.hseg{height:100%}
.hpct{font-size:11px;color:var(--muted);width:190px;flex:none;text-align:right}
.hdone{width:100%;font-size:11.5px;color:#4A4152;border-top:1px dashed var(--line2);padding-top:8px;margin-top:2px}
.hdone b{color:var(--ok)}
.history-split{display:grid;grid-template-columns:1fr;gap:18px}
.history-item{display:flex;align-items:center;gap:15px;padding:14px 16px;border:1px solid var(--line);border-radius:11px;background:var(--surface);margin-bottom:9px}
.history-item-main{flex:1;min-width:0}
.history-item-title{font-size:13.5px;font-weight:750;overflow-wrap:anywhere}
.history-item-meta{font-size:11.5px;color:var(--muted)}
.history-actions{display:flex;gap:8px;flex-wrap:wrap}
.history-empty,.history-error,.history-loading{padding:18px;border:1px dashed var(--line2);border-radius:11px;text-align:center;color:var(--muted)}
.history-error{color:var(--warn);background:var(--warn-bg);border-color:var(--warn-line)}
.history-detail-content{display:flex;flex-direction:column;gap:13px}
.history-section{padding:17px;border:1px solid var(--line);border-radius:12px;background:var(--surface)}
.history-section h2{font-size:15px;margin:0 0 10px}.history-section h3{font-size:13.5px;margin:0 0 4px}.history-section p{font-size:12.5px;margin:3px 0;color:#4A4152}
.history-goals,.history-quadrants{display:grid;grid-template-columns:1fr 1fr;gap:10px}.history-goals>div,.history-quadrants>div{background:var(--bg);border-radius:9px;padding:10px}
.history-tasks{display:flex;flex-direction:column;gap:8px}.history-tasks article{background:var(--bg);border-radius:9px;padding:11px}

.mask{position:fixed;inset:0;background:rgba(44,37,48,.42);z-index:70;display:grid;place-items:center;padding:20px}
.modal{width:440px;max-width:100%;background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);padding:24px}
.modal h3{margin:0 0 4px;font-size:17px}.modal .sub{color:var(--muted);font-size:12.5px;margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.err{color:var(--warn);font-size:12px;margin-top:10px}.mact{display:flex;gap:10px;margin-top:18px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);transition:.25s;z-index:90;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:1000px){
  .ws-grid{grid-template-columns:1fr}.cols4,.hgrid{grid-template-columns:1fr 1fr}
  .stepper{position:static;display:flex;overflow-x:auto}.step:not(:last-child)::after{display:none}.step{flex:none;min-width:140px}
